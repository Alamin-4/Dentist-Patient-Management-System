name: Build, Push, and Deploy

on:
  push:
    branches:
      - main

jobs:
  docker:
    name: Build & Push Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: vars
        run: echo "image=docker.io/${{ secrets.DOCKER_USERNAME }}/rated-docs-website" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.vars.outputs.image }}:latest
            ${{ steps.vars.outputs.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            IMAGE="${{ secrets.DOCKER_USERNAME }}/rated-docs-website:latest"
            DOMAIN="${{ secrets.DOMAIN_NAME }}"
            if [ -z "$DOMAIN" ]; then
              DOMAIN="localhost"
            fi

            echo "→ Creating deployment directory..."
            mkdir -p ~/rateddocs-deploy
            cd ~/rateddocs-deploy

            echo "→ Writing Caddyfile..."
            cat << EOF > Caddyfile
            $DOMAIN {
                reverse_proxy web:3000
            }
            EOF

            echo "→ Writing docker-compose.yml..."
            cat << EOF > docker-compose.yml
            services:
              web:
                image: $IMAGE
                restart: unless-stopped
                expose:
                  - "3000"
                environment:
                  - PORT=3000
                  - HOSTNAME=0.0.0.0
                  - NODE_ENV=production

              caddy:
                image: caddy:2-alpine
                restart: unless-stopped
                ports:
                  - "80:80"
                  - "443:443"
                volumes:
                  - ./Caddyfile:/etc/caddy/Caddyfile
                  - caddy_data:/data
                  - caddy_config:/config
                depends_on:
                  - web

            volumes:
              caddy_data:
              caddy_config:
            EOF

            echo "→ Stopping old standalone containers if running..."
            docker stop rated-docs-website || true
            docker rm rated-docs-website || true

            echo "→ Pulling latest image..."
            docker-compose pull web

            echo "→ Deploying via Docker Compose..."
            docker-compose up -d --remove-orphans

            echo "→ Cleaning up old images..."
            docker image prune -f

            echo "✓ Deployment successful"
